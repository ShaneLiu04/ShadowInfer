name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout black isort mypy

      - name: Check code formatting (black)
        run: black --check shadowinfer/ tests/ benchmarks/ exporter/

      - name: Check import sorting (isort)
        run: isort --check-only shadowinfer/ tests/ benchmarks/ exporter/

      - name: Run type checking (mypy)
        run: mypy shadowinfer/ --ignore-missing-imports --show-error-codes

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=shadowinfer \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            --timeout=300 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run benchmark suite
        run: |
          python benchmarks/run_benchmarks.py --output-format json --output-file benchmark_results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.json
